Group "Bash Completions" (
	File "doas" (
		Source "doas.bash"
		Target "$HOME/.local/etc/bash_completion.d/doas.bash"
	)

	File "adb" (
		Source "adb.bash"
		Target "$HOME/.local/etc/bash_completion.d/adb.bash"
	)

	File "Gradle script" (
		Source "gradle.bash"
		Target "$HOME/.local/etc/bash_completion.d/gradle.bash"
	)
)

Include "git"
